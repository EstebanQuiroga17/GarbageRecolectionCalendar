<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos de Basura - Residencia</title>
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Gestión de Residuos</h1>

        <div class="card">
            <h2>HOY LE TOCA A:</h2>
            <div class="name" id="today-person">Cargando...</div>
            <div class="date-display" id="date-display"></div>
        </div>

        <div class="rest-card">
            Descansan esta semana: <strong id="resting-people"></strong>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Día</th>
                        <th>Encargado/a</th>
                        <th>Grupo</th>
                    </tr>
                </thead>
                <tbody id="schedule-body">
                    <!-- Las filas se inyectarán aquí mediante JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Enlace al archivo JavaScript -->
    <script src="script.js"></script>
</body>
</html>
